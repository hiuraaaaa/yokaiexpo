name: Ekstrak Zip Otomatis

on:
  push:
    paths:
      - '**/*.zip'

jobs:
  extract:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Cari dan ekstrak semua zip
        run: |
          find . -name "*.zip" | while read zipfile; do
            echo "Ekstrak: $zipfile"
            unzip -o "$zipfile" -d .
            rm "$zipfile"
          done

      - name: Commit hasil ekstrak
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add -A
          git commit -m "Auto ekstrak zip" || echo "No changes"
          git push
